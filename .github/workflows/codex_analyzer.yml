name: codex_analyzer

on:
  workflow_run:
    workflows: ["issue_context_builder"]
    types: [completed]
    branches: [main, master]

jobs:
  analyze:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      SENTRY_DSN: ""

    permissions:
      actions: read
      contents: write
      pull-requests: write
      issues: write

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download Context Artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ github.token }}
          run_id: ${{ github.event.workflow_run.id }}
          name: ai-context
          path: ai-context

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Prepare Prompt
        run: |
          cat <<EOF > codex-prompt.md
          You are a senior JavaScript engineer.

          Goal:
          Fix the issue described in the context.

          Workflow you must follow:

          1. Understand the stacktrace and issue.
          2. Identify the root cause in the repository.
          3. Create a TEMPORARY Jest test reproducing the bug.

          The temporary test must be placed in:

          .tmp-tests/

          Requirements:

          - The test must reproduce the issue.
          - The test must fail before the fix.
          - Modify production code to fix the issue.
          - After fixing, the test should pass.

          Constraints:

          - Follow SOLID, DRY and KISS.
          - Do NOT modify package.json.
          - Do NOT commit files inside .tmp-tests/

          Output format:

          ROOT CAUSE
          <short explanation>

          FIX SUMMARY
          <short explanation>

          Context:
          EOF

          cat ai-context/context.txt >> codex-prompt.md

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Attempt Fix (max 3)
        run: |
          mkdir -p .tmp-tests

          for i in 1 2 3
          do
            echo "Attempt $i"

            codex \
              --model gpt-5-codex \
              --apply \
              --prompt-file codex-prompt.md \
              --output-file codex-output.md || true

            echo "Running temporary tests"

            if npx jest .tmp-tests; then
              echo "Tests passed"
              exit 0
            fi

            echo "Fix attempt failed"
          done

          echo "TEST_FAILED=true" >> $GITHUB_ENV
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Create Branch
        run: git checkout -b codex/fix-${{ github.run_id }}

      - name: Remove Temporary Tests
        run: rm -rf .tmp-tests

      - name: Commit Changes
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"

          git add .

          git commit -m "codex automatic fix" || echo "No changes"

      - name: Push Branch
        run: git push origin HEAD

      - name: Create Pull Request (success)
        if: env.TEST_FAILED != 'true'
        run: |
          gh pr create \
            --base ${{ github.event.workflow_run.head_branch }} \
            --head codex/fix-${{ github.run_id }} \
            --title "Codex Fix" \
            --body-file codex-output.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Pull Request (needs help)
        if: env.TEST_FAILED == 'true'
        run: |
          echo "ROOT CAUSE" > pr-body.md
          echo "Could not fully resolve automatically." >> pr-body.md
          echo "" >> pr-body.md
          echo "FIX SUMMARY" >> pr-body.md
          echo "Partial fix attempt created by Codex." >> pr-body.md
          gh pr create \
            --base ${{ github.event.workflow_run.head_branch }} \
            --head codex/fix-${{ github.run_id }} \
            --title "Codex Fix (Needs Help)" \
            --body-file pr-body.md \
            --label "needs-help"
        env:
          GH_TOKEN: ${{ github.token }}