# Requires GH_PAT secret (PAT with repo scope) - GITHUB_TOKEN cannot create PRs in some repos
name: codex_analyzer

on:
  workflow_run:
    workflows: ["issue_context_builder"]
    types: [completed]
    branches: [main, master]

jobs:
  analyze:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      SENTRY_DSN: ""

    permissions:
      actions: read
      contents: write
      pull-requests: write
      issues: write

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download Context Artifact
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ github.token }}
          run_id: ${{ github.event.workflow_run.id }}
          name: ai-context
          path: ai-context

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Install Jest
        run: npm install jest --save-dev

      - name: Prepare Prompt
        run: |
          cat <<EOF > codex-prompt.md
          You are a senior JavaScript engineer.

          Goal:
          Fix ONLY the issue described in the context. Nothing else.

          CRITICAL — SCOPE AND DISCIPLINE (very important):

          - IGNORE other implementations and unrelated code. Do NOT refactor, improve, or touch code outside the reported issue.
          - FOCUS strictly on the reported issue. Read the issue/stacktrace and fix only what is broken.
          - MINIMAL file changes: change only the files necessary to fix the issue. Prefer the smallest possible diff.
          - Follow the software document and any AI/Sentry guidelines in the repo when implementing the fix.
          - Apply Sentry best practices and understanding where the issue involves error reporting or instrumentation.
          - ONLY implement the fix required for the reported issue. No extra features, no style changes, no "improvements."

          Workflow you must follow:

          1. Understand the stacktrace and issue.
          2. Identify the root cause in the repository.
          3. Create a TEMPORARY Jest test reproducing the bug.

          The temporary test MUST be placed in .tmp-tests/ and MUST use the .test.js extension (e.g. .tmp-tests/bug.test.js) so Jest can find it.

          Requirements:

          - The test must reproduce the issue.
          - The test must fail before the fix.
          - Modify production code to fix the issue (minimal changes only).
          - After fixing, the test should pass.

          Constraints:

          - Follow SOLID, DRY and KISS.
          - Do NOT modify package.json.
          - Do NOT commit files inside .tmp-tests/
          - Do NOT add or modify node_modules (e.g. do not create stubs under node_modules/@sentry). @sentry/node is stubbed for Jest via jest/sentry-stub.js; just import the SDK and run tests.
          - Run tests with: NODE_OPTIONS=--experimental-vm-modules npx jest .tmp-tests (project uses ESM)

          Output format (in your final message):

          ROOT CAUSE
          <short explanation>

          FIX SUMMARY
          <short explanation>

          Context:
          EOF

          cat ai-context/context.txt >> codex-prompt.md

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Authenticate Codex
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: printenv OPENAI_API_KEY | codex login --with-api-key

      - name: Attempt Fix (max 3)
        run: |
          set -e
          mkdir -p .tmp-tests

          for i in 1 2 3; do
            echo "=== Attempt $i/3 ==="
            echo "OPENAI_API_KEY length: ${#OPENAI_API_KEY}"

            codex exec \
              --full-auto \
              --sandbox workspace-write \
              -o codex-output.md \
              "$(cat codex-prompt.md)" || { echo "Codex failed"; continue; }

            echo "Running temporary tests..."
            ls -la .tmp-tests/ 2>/dev/null || echo "No files in .tmp-tests yet"

            if NODE_OPTIONS=--experimental-vm-modules npx jest .tmp-tests --passWithNoTests; then
              if [ -n "$(find .tmp-tests -name '*.test.js' 2>/dev/null || true)" ]; then
                echo "Tests passed"
                exit 0
              fi
            fi

            echo "Fix attempt $i failed"
          done

          echo "TEST_FAILED=true" >> $GITHUB_ENV
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NODE_OPTIONS: --experimental-vm-modules

      - name: Create Branch
        run: git checkout -b codex/fix-${{ github.run_id }}

      - name: Remove Temporary Tests
        run: rm -rf .tmp-tests

      - name: Commit Changes
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"

          git add .

          git commit -m "codex automatic fix" || echo "No changes"

      - name: Push Branch
        run: git push origin HEAD

      - name: Create Pull Request (success)
        if: env.TEST_FAILED != 'true'
        run: |
          gh pr create \
            --base ${{ github.event.workflow_run.head_branch }} \
            --head codex/fix-${{ github.run_id }} \
            --title "Codex Fix" \
            --body-file codex-output.md
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Create Pull Request (needs help)
        if: env.TEST_FAILED == 'true'
        run: |
          echo "ROOT CAUSE" > pr-body.md
          echo "Could not fully resolve automatically." >> pr-body.md
          echo "" >> pr-body.md
          echo "FIX SUMMARY" >> pr-body.md
          echo "Partial fix attempt created by Codex." >> pr-body.md
          gh pr create \
            --base ${{ github.event.workflow_run.head_branch }} \
            --head codex/fix-${{ github.run_id }} \
            --title "Codex Fix (Needs Help)" \
            --body-file pr-body.md
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}