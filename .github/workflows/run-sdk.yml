name: run-sdk

on:
  workflow_dispatch: {}      # manual trigger
  schedule:
    - cron: "* * * * *"     # every minute
  push:
    branches: [main, master]
    paths:
      - "sdk/**"
      - "package.json"
      - ".github/workflows/run-sdk.yml"

jobs:
  run-sdk:
    runs-on: ubuntu-latest
    env:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set package directory
        id: pkg
        run: |
          if [ -f packages/demo-sdk/package.json ]; then
            echo "dir=packages/demo-sdk" >> $GITHUB_OUTPUT
          else
            echo "dir=." >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ${{ steps.pkg.outputs.dir }}/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: ${{ steps.pkg.outputs.dir }}

      - name: Run SDK demo
        run: npm run sdk
        working-directory: ${{ steps.pkg.outputs.dir }}